<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutriLog Pro - Dashboard de Biometría y Porciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --water: #3b82f6;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        .progress-transition { transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .animate-entry { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .week-btn {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .week-btn.active {
            transform: scale(1.2);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.3);
        }

        .drop-icon {
            transition: all 0.4s ease;
            filter: drop-shadow(0 2px 4px rgba(59, 130, 246, 0.2));
        }
        .drop-active { color: #3b82f6; transform: scale(1.1); }
        .drop-empty { color: #e2e8f0; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        /* Sugerencias de búsqueda */
        #search-results {
            max-height: 250px;
            overflow-y: auto;
            z-index: 50;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen selection:bg-blue-100">

    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] w-[90%] max-w-md pointer-events-none flex flex-col gap-2"></div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] max-w-sm w-full p-8 shadow-2xl animate-entry text-center border border-slate-100">
            <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-trash-can text-3xl"></i>
            </div>
            <h3 class="text-2xl font-bold text-slate-900 mb-3">¿Limpiar datos?</h3>
            <p class="text-slate-500 mb-8">Esta acción borrará alimentos y consumo de agua de hoy.</p>
            <div class="flex flex-col sm:flex-row gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 px-6 py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl">Cancelar</button>
                <button id="modal-confirm-btn" class="flex-1 px-6 py-4 bg-red-500 text-white font-bold rounded-2xl shadow-lg shadow-red-100">Sí, borrar</button>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div id="import-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] max-w-2xl w-full p-6 md:p-8 shadow-2xl animate-entry flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-slate-900 tracking-tight">Importar Reporte</h3>
                <button onclick="closeImportModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 text-slate-400">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <textarea id="import-text" class="flex-1 w-full min-h-[200px] bg-slate-50 border border-slate-100 rounded-3xl p-6 text-sm outline-none focus:ring-2 focus:ring-blue-500 mb-6" placeholder="Pega el mensaje de WhatsApp aquí..."></textarea>
            <button onclick="procesarTextoImportado()" class="w-full px-6 py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-100">PROCESAR AHORA</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-6 space-y-6">
        
        <header class="flex flex-col lg:flex-row justify-between items-center bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 gap-6">
            <div class="flex items-center gap-4 self-start lg:self-center">
                <div id="brand-icon" class="w-14 h-14 bg-blue-600 rounded-[1.25rem] flex items-center justify-center text-white text-2xl shadow-xl transition-all duration-500">
                    <i class="fa-solid fa-bolt"></i>
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-black tracking-tighter text-slate-900">NutriLog <span id="brand-badge" class="text-blue-600 font-extrabold text-xs md:text-sm uppercase px-3 py-1 bg-blue-50 rounded-full ml-1">PRO</span></h1>
                    <p class="text-[10px] md:text-xs text-slate-400 font-bold uppercase tracking-[0.2em]">Bio-Tracking Engine</p>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-2 w-full lg:w-auto">
                <button onclick="abrirImportModal()" class="flex flex-col items-center justify-center gap-1 p-3 bg-slate-50 text-slate-600 font-bold rounded-2xl text-[10px] active:scale-95 transition">
                    <i class="fa-solid fa-file-import text-lg"></i> IMPORTAR
                </button>
                <button onclick="compartirReporte()" class="flex flex-col items-center justify-center gap-1 p-3 bg-emerald-600 text-white font-bold rounded-2xl text-[10px] shadow-lg shadow-emerald-100 active:scale-95 transition">
                    <i class="fa-solid fa-share-nodes text-lg"></i> COMPARTIR
                </button>
                <button onclick="solicitarLimpieza()" class="flex flex-col items-center justify-center gap-1 p-3 bg-red-50 text-red-500 font-bold rounded-2xl text-[10px] active:scale-95 transition">
                    <i class="fa-solid fa-trash-can text-lg"></i> LIMPIAR
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <aside class="lg:col-span-4 space-y-6">
                <!-- Perfil -->
                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xs font-black uppercase tracking-widest text-slate-400">Perfil Biométrico</h3>
                        <span id="bmi-badge" class="px-3 py-1 rounded-full bg-slate-50 text-slate-400 text-[10px] font-bold">IMC: --</span>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="bg-slate-50/50 p-4 rounded-3xl border border-slate-100">
                            <label class="text-[9px] font-black uppercase text-slate-400 block mb-4 text-center tracking-widest">Semana del Ciclo</label>
                            <div class="flex justify-between items-center px-4">
                                <button onclick="seleccionarSemana('Azul')" id="week-Azul" class="week-btn w-10 h-10 rounded-full bg-blue-500"></button>
                                <button onclick="seleccionarSemana('Rojo')" id="week-Rojo" class="week-btn w-10 h-10 rounded-full bg-red-500"></button>
                                <button onclick="seleccionarSemana('Yellow')" id="week-Yellow" class="week-btn w-10 h-10 rounded-full bg-yellow-400"></button>
                                <button onclick="seleccionarSemana('Black')" id="week-Black" class="week-btn w-10 h-10 rounded-full bg-black"></button>
                            </div>
                        </div>

                        <input type="text" id="user-name" onchange="guardarPerfil()" placeholder="Nombre" class="w-full bg-slate-50 border-transparent focus:bg-white focus:ring-2 focus:ring-blue-500 p-4 rounded-2xl outline-none font-bold text-slate-700 transition-all">
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div class="relative">
                                <input type="number" id="user-weight" onchange="guardarPerfil()" placeholder="Peso" class="w-full bg-slate-50 border-transparent p-4 rounded-2xl outline-none font-bold text-center">
                                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[9px] text-slate-300 font-black">KG</span>
                            </div>
                            <div class="relative">
                                <input type="number" id="user-height" onchange="guardarPerfil()" placeholder="Alt" class="w-full bg-slate-50 border-transparent p-4 rounded-2xl outline-none font-bold text-center">
                                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[9px] text-slate-300 font-black">CM</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Hidratación -->
                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden bg-gradient-to-br from-white to-blue-50/30">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xs font-black uppercase tracking-widest text-blue-500">Hidratación</h3>
                        <div class="flex items-center bg-blue-50 p-1 rounded-xl">
                            <button onclick="setWaterUnit('ml')" id="unit-ml" class="px-2 py-1 text-[9px] font-black rounded-lg bg-white shadow-sm text-blue-600 transition">ML</button>
                            <button onclick="setWaterUnit('L')" id="unit-L" class="px-2 py-1 text-[9px] font-black rounded-lg text-slate-400 transition">L</button>
                        </div>
                    </div>

                    <div class="flex flex-col items-center mb-6">
                        <div class="flex flex-wrap justify-center gap-2 mb-4" id="water-drops-container"></div>
                        <div class="text-center">
                            <span id="water-current" class="text-4xl font-black text-blue-600">0</span>
                            <span id="water-unit-display" class="text-blue-300 font-bold ml-1">ml</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="water-input" placeholder="Cantidad" class="w-full bg-blue-50/50 border-transparent p-4 rounded-2xl outline-none font-bold text-center text-blue-600">
                        <button onclick="addWater()" class="bg-blue-600 text-white font-black rounded-2xl active:scale-95 transition shadow-lg shadow-blue-100">
                            + AÑADIR
                        </button>
                    </div>
                </div>
                
                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm relative">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-3">
                        <span class="w-8 h-8 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-sm"><i class="fa-solid fa-plus"></i></span>
                        Alimento
                    </h2>
                    <div class="space-y-4">
                        <div class="relative">
                            <input type="text" id="alimento" oninput="buscarCatalogo(this.value)" placeholder="¿Qué comiste?" class="w-full bg-slate-50 border-transparent p-4 rounded-2xl outline-none focus:bg-white transition-all font-medium" autocomplete="off">
                            <!-- Lista de sugerencias dinámica -->
                            <div id="search-results" class="absolute left-0 right-0 top-full mt-2 bg-white rounded-2xl shadow-2xl border border-slate-100 hidden z-50 overflow-hidden"></div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="cantidad-alimento" placeholder="Cantidad" class="w-full bg-slate-50 border-transparent p-4 rounded-2xl outline-none font-bold text-center text-slate-600">
                            <select id="unidad-alimento" class="w-full bg-slate-50 border-transparent p-4 rounded-2xl outline-none font-bold text-center text-slate-600 appearance-none">
                                <option value="Unidad">Unidad</option>
                                <option value="Gramos">Gramos (g)</option>
                                <option value="Onzas">Onzas (oz)</option>
                                <option value="Slides">Slides (reb)</option>
                                <option value="Liquid">Líquido (ml)</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="calorias" placeholder="Calorías" class="w-full bg-slate-50 border-transparent p-4 rounded-2xl outline-none font-bold text-center">
                            <input type="number" id="proteinas" placeholder="Prot (g)" class="w-full bg-emerald-50/50 border-transparent p-4 rounded-2xl outline-none font-bold text-center text-emerald-600">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="carbs" placeholder="Carb (g)" class="w-full bg-amber-50/50 border-transparent p-4 rounded-2xl outline-none font-bold text-center text-amber-600">
                            <input type="number" id="grasas" placeholder="Grasa (g)" class="w-full bg-rose-50/50 border-transparent p-4 rounded-2xl outline-none font-bold text-center text-rose-600">
                        </div>
                        <button onclick="agregarEntrada()" class="w-full bg-slate-900 text-white font-black py-5 rounded-[1.5rem] shadow-xl active:scale-95 transition-all">
                            GUARDAR REGISTRO
                        </button>
                    </div>
                </div>
            </aside>

            <section class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Calorías Totales</p>
                                <div class="flex items-baseline gap-2">
                                    <span id="txt-progreso" class="text-6xl font-black text-slate-900 tracking-tighter">0</span>
                                    <span class="text-slate-300 font-bold text-xl">/ 2000</span>
                                </div>
                            </div>
                            <div id="porcentaje" class="text-lg font-black text-blue-600 bg-blue-50 px-4 py-2 rounded-2xl">0%</div>
                        </div>
                        <div class="w-full bg-slate-100 h-8 rounded-full overflow-hidden p-1.5">
                            <div id="barra-progreso" class="h-full bg-blue-600 rounded-full progress-transition" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm flex items-center justify-between">
                        <div class="w-32 h-32 md:w-40 md:h-40 relative">
                            <canvas id="macroChart"></canvas>
                        </div>
                        <div class="flex flex-col gap-3">
                            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-emerald-500"></span><span class="text-[10px] font-bold text-slate-500 uppercase">Proteínas</span></div>
                            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-amber-500"></span><span class="text-[10px] font-bold text-slate-500 uppercase">Carbos</span></div>
                            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-rose-500"></span><span class="text-[10px] font-bold text-slate-500 uppercase">Grasas</span></div>
                        </div>
                    </div>
                </div>

                <!-- Historial -->
                <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
                    <div class="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                        <h3 class="font-black text-slate-800 text-sm uppercase tracking-widest">Registros de Hoy</h3>
                        <span id="items-count" class="text-[10px] font-black bg-white border border-slate-100 text-slate-400 px-4 py-2 rounded-full">0 Items</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <tbody id="tabla-cuerpo" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                    <div id="empty-state" class="py-20 text-center flex flex-col items-center gap-4">
                        <i class="fa-solid fa-utensils text-slate-200 text-3xl"></i>
                        <p class="text-slate-300 font-medium italic">Sin registros para hoy</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // CATÁLOGO COMPLETO BASADO EN LA PIRÁMIDE ALIMENTICIA
        const CATALOGO = [
            { nombre: "Arroz integral cocido (100g)", calorias: 112 },
            { nombre: "Arroz blanco cocido (100g)", calorias: 130 },
            { nombre: "Avena en hojuelas (50g)", calorias: 194 },
            { nombre: "Pan integral (1 rebanada)", calorias: 75 },
            { nombre: "Pasta de trigo cocida (100g)", calorias: 131 },
            { nombre: "Patata / Papa cocida (100g)", calorias: 87 },
            { nombre: "Quinoa cocida (100g)", calorias: 120 },
            { nombre: "Maíz dulce en grano (100g)", calorias: 86 },
            { nombre: "Espinacas crudas (100g)", calorias: 23 },
            { nombre: "Brócoli cocido (100g)", calorias: 35 },
            { nombre: "Tomate crudo (100g)", calorias: 18 },
            { nombre: "Zanahoria cruda (100g)", calorias: 41 },
            { nombre: "Lechuga romana (100g)", calorias: 17 },
            { nombre: "Manzana mediana (1 ud)", calorias: 52 },
            { nombre: "Plátano / Banana (1 ud)", calorias: 89 },
            { nombre: "Naranja mediana (1 ud)", calorias: 62 },
            { nombre: "Fresas / Frutillas (100g)", calorias: 32 },
            { nombre: "Kiwi (1 ud)", calorias: 61 },
            { nombre: "Aguacate / Palta (100g)", calorias: 160 },
            { nombre: "Leche entera (1 taza 240ml)", calorias: 149 },
            { nombre: "Leche desnatada/descremada (240ml)", calorias: 83 },
            { nombre: "Yogur natural entero (100g)", calorias: 61 },
            { nombre: "Queso fresco tipo Burgos (100g)", calorias: 100 },
            { nombre: "Queso Mozzarella (50g)", calorias: 140 },
            { nombre: "Pechuga de Pollo a la plancha (100g)", calorias: 165 },
            { nombre: "Carne de Res magra (100g)", calorias: 250 },
            { nombre: "Filete de Cerdo (100g)", calorias: 143 },
            { nombre: "Salmón a la plancha (100g)", calorias: 208 },
            { nombre: "Atún en agua enlatado (100g)", calorias: 116 },
            { nombre: "Huevo entero cocido (1 ud)", calorias: 78 },
            { nombre: "Lentejas cocidas (100g)", calorias: 116 },
            { nombre: "Garbanzos cocidos (100g)", calorias: 164 },
            { nombre: "Aceite de Oliva (1 cucharada)", calorias: 119 },
            { nombre: "Almendras (un puñado - 30g)", calorias: 173 },
            { nombre: "Nueces (un puñado - 30g)", calorias: 196 },
            { nombre: "Azúcar blanco (1 cucharadita)", calorias: 16 },
            { nombre: "Chocolate negro 70% (20g)", calorias: 120 },
            { nombre: "Galletas María (4 unidades)", calorias: 100 }
        ];

        let registros = JSON.parse(localStorage.getItem('nutrilog_v6_data')) || [];
        let agua = parseInt(localStorage.getItem('nutrilog_v6_water')) || 0;
        let waterUnit = 'ml';
        let perfil = JSON.parse(localStorage.getItem('nutrilog_v6_perfil')) || { nombre: '', peso: '', altura: '', semana: 'Azul' };
        let myChart = null;

        window.onload = () => {
            document.getElementById('user-name').value = perfil.nombre;
            document.getElementById('user-weight').value = perfil.peso;
            document.getElementById('user-height').value = perfil.altura;
            seleccionarSemana(perfil.semana || 'Azul');
            actualizarInterfaz();
            renderWaterDrops();

            // Cerrar buscador al hacer click fuera
            document.addEventListener('click', (e) => {
                if(!e.target.closest('#alimento')) document.getElementById('search-results').classList.add('hidden');
            });
        };

        // --- LÓGICA DE BÚSQUEDA ---
        function buscarCatalogo(query) {
            const resultsDiv = document.getElementById('search-results');
            if (query.length < 1) {
                resultsDiv.classList.add('hidden');
                return;
            }

            const filtered = CATALOGO.filter(item => 
                item.nombre.toLowerCase().includes(query.toLowerCase())
            ).slice(0, 6);

            if (filtered.length > 0) {
                resultsDiv.innerHTML = filtered.map(item => `
                    <div onclick="seleccionarCatalogo('${item.nombre}', ${item.calorias})" 
                         class="p-4 hover:bg-blue-50 cursor-pointer border-b border-slate-50 last:border-0 flex justify-between items-center transition">
                        <span class="font-semibold text-slate-700 text-sm">${item.nombre}</span>
                        <span class="text-xs font-bold text-blue-500 bg-blue-50 px-2 py-1 rounded-lg">${item.calorias} kcal</span>
                    </div>
                `).join('');
                resultsDiv.classList.remove('hidden');
            } else {
                resultsDiv.classList.add('hidden');
            }
        }

        function seleccionarCatalogo(nombre, calorias) {
            document.getElementById('alimento').value = nombre;
            document.getElementById('calorias').value = calorias;
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('cantidad-alimento').focus();
            showToast("Alimento seleccionado del catálogo 🍎");
        }

        // --- LÓGICA DE AGUA ---
        function setWaterUnit(unit) {
            waterUnit = unit;
            document.getElementById('unit-ml').className = unit === 'ml' ? 'px-2 py-1 text-[9px] font-black rounded-lg bg-white shadow-sm text-blue-600 transition' : 'px-2 py-1 text-[9px] font-black rounded-lg text-slate-400 transition';
            document.getElementById('unit-L').className = unit === 'L' ? 'px-2 py-1 text-[9px] font-black rounded-lg bg-white shadow-sm text-blue-600 transition' : 'px-2 py-1 text-[9px] font-black rounded-lg text-slate-400 transition';
            document.getElementById('water-unit-display').innerText = unit;
            actualizarInterfazAgua();
        }

        function addWater() {
            let val = parseFloat(document.getElementById('water-input').value);
            if (isNaN(val) || val <= 0) { showToast("Ingresa una cantidad", "warning"); return; }
            if (waterUnit === 'L') val = val * 1000;
            agua += val;
            localStorage.setItem('nutrilog_v6_water', agua);
            document.getElementById('water-input').value = "";
            actualizarInterfazAgua();
            renderWaterDrops();
            showToast(`+${val}${waterUnit} registrados 💧`);
        }

        function renderWaterDrops() {
            const container = document.getElementById('water-drops-container');
            container.innerHTML = "";
            const numDrops = Math.max(8, Math.ceil(agua / 250));
            const activeDrops = Math.floor(agua / 250);
            for (let i = 0; i < numDrops; i++) {
                const drop = document.createElement('i');
                drop.className = `fa-solid fa-droplet drop-icon ${i < activeDrops ? 'drop-active' : 'drop-empty'} text-xl`;
                container.appendChild(drop);
            }
        }

        function actualizarInterfazAgua() {
            const display = document.getElementById('water-current');
            display.innerText = waterUnit === 'ml' ? agua : (agua / 1000).toFixed(1);
        }

        // --- PERFIL Y BIOMETRÍA ---
        function seleccionarSemana(color) {
            perfil.semana = color;
            localStorage.setItem('nutrilog_v6_perfil', JSON.stringify(perfil));
            document.querySelectorAll('.week-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`week-${color}`).classList.add('active');
            
            const colorMap = { 'Azul': '#3b82f6', 'Rojo': '#ef4444', 'Yellow': '#facc15', 'Black': '#000000' };
            document.getElementById('brand-icon').style.backgroundColor = colorMap[color];
            document.getElementById('brand-badge').style.color = colorMap[color];
        }

        function guardarPerfil() {
            perfil.nombre = document.getElementById('user-name').value;
            perfil.peso = document.getElementById('user-weight').value;
            perfil.altura = document.getElementById('user-height').value;
            localStorage.setItem('nutrilog_v6_perfil', JSON.stringify(perfil));
            actualizarInterfaz();
        }

        function calcularIMC() {
            const w = parseFloat(perfil.peso);
            const h = parseFloat(perfil.altura) / 100;
            const badge = document.getElementById('bmi-badge');
            if (w > 0 && h > 0) {
                const imc = (w / (h * h)).toFixed(1);
                badge.innerText = `IMC: ${imc}`;
                badge.className = "px-3 py-1 rounded-full bg-blue-50 text-blue-600 text-[10px] font-black";
            }
        }

        // --- GESTIÓN DE REGISTROS ---
        function agregarEntrada() {
            const n = document.getElementById('alimento').value;
            const k = parseInt(document.getElementById('calorias').value);
            if (!n || isNaN(k)) { showToast("Alimento y calorías requeridos", "warning"); return; }

            const entry = {
                id: Date.now(),
                nombre: n,
                kcal: k,
                cantidad: document.getElementById('cantidad-alimento').value || 1,
                unidad: document.getElementById('unidad-alimento').value,
                prot: parseInt(document.getElementById('proteinas').value) || 0,
                carb: parseInt(document.getElementById('carbs').value) || 0,
                fat: parseInt(document.getElementById('grasas').value) || 0,
                fecha: new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
            };

            registros.push(entry);
            guardarYRefrescar();
            limpiarCampos();
            showToast("Registro guardado con éxito ✨");
        }

        function limpiarCampos() {
            ['alimento', 'calorias', 'proteinas', 'carbs', 'grasas', 'cantidad-alimento'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('alimento').focus();
        }

        function eliminarItem(id) {
            registros = registros.filter(r => r.id !== id);
            guardarYRefrescar();
            showToast("Registro eliminado", "danger");
        }

        function guardarYRefrescar() {
            localStorage.setItem('nutrilog_v6_data', JSON.stringify(registros));
            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            const cuerpo = document.getElementById('tabla-cuerpo');
            const empty = document.getElementById('empty-state');
            cuerpo.innerHTML = "";
            let totals = { kcal: 0, prot: 0, carb: 0, fat: 0 };

            if (registros.length === 0) {
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                [...registros].reverse().forEach(r => {
                    totals.kcal += r.kcal; totals.prot += r.prot;
                    totals.carb += r.carb; totals.fat += r.fat;
                    cuerpo.innerHTML += `
                        <tr class="animate-entry group">
                            <td class="p-6">
                                <div class="font-bold text-slate-800">${r.nombre}</div>
                                <div class="text-[9px] text-slate-400 font-bold uppercase mt-1">
                                    ${r.cantidad} ${r.unidad} • ${r.fecha}
                                </div>
                            </td>
                            <td class="p-6 text-center">
                                <span class="font-black text-slate-900">${r.kcal}</span>
                                <span class="block text-[8px] text-slate-400 font-bold">KCAL</span>
                            </td>
                            <td class="p-6 text-right">
                                <button onclick="eliminarItem(${r.id})" class="w-10 h-10 rounded-full bg-slate-50 text-slate-300 hover:bg-red-50 hover:text-red-500 transition-all">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </td>
                        </tr>`;
                });
            }

            document.getElementById('txt-progreso').innerText = totals.kcal;
            document.getElementById('items-count').innerText = `${registros.length} Registros`;
            const porc = Math.min(100, Math.round((totals.kcal / 2000) * 100));
            document.getElementById('porcentaje').innerText = porc + "%";
            document.getElementById('barra-progreso').style.width = porc + "%";

            actualizarGrafico(totals.prot, totals.carb, totals.fat);
            calcularIMC();
        }

        function actualizarGrafico(p, c, g) {
            const ctx = document.getElementById('macroChart').getContext('2d');
            const data = { datasets: [{ data: [p||1, c||1, g||1], backgroundColor: ['#10b981', '#f59e0b', '#ef4444'], borderWidth: 0, hoverOffset: 4 }] };
            if (myChart) { myChart.data = data; myChart.update(); }
            else { myChart = new Chart(ctx, { type: 'doughnut', data: data, options: { cutout: '75%', plugins: { legend: { display: false } } } }); }
        }

        // --- IMPORTACIÓN Y COMPARTIR ---
        function abrirImportModal() { document.getElementById('import-modal').classList.remove('hidden'); }
        function closeImportModal() { document.getElementById('import-modal').classList.add('hidden'); }

        function procesarTextoImportado() {
            const texto = document.getElementById('import-text').value;
            const regex = /•\s*(.*?):\s*(\d+)\s*kcal/gi;
            let match, count = 0;
            while ((match = regex.exec(texto)) !== null) {
                registros.push({
                    id: Date.now() + count,
                    nombre: match[1].trim(),
                    kcal: parseInt(match[2]),
                    cantidad: 1, unidad: "Unidad", prot: 0, carb: 0, fat: 0,
                    fecha: new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
                });
                count++;
            }
            if (count > 0) { guardarYRefrescar(); closeImportModal(); showToast(`${count} registros importados 🚀`); }
            else showToast("No se detectó el formato", "warning");
        }

        function compartirReporte() {
            if (registros.length === 0) { showToast("No hay datos hoy", "warning"); return; }
            
            const now = new Date();
            const fStr = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
            const hStr = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            
            let t = { k:0, p:0, c:0, g:0 }, list = "";
            registros.forEach(r => {
                t.k += r.kcal; t.p += r.prot; t.c += r.carb; t.g += r.fat;
                list += `• ${r.nombre}: ${r.kcal} kcal (${r.cantidad} ${r.unidad})\n`;
            });

            const msg = `🍎 *NutriLog Pro - Reporte* 🍎
👤 *Usuario:* ${perfil.nombre || 'Sin nombre'}
🎨 *Semana:* ${perfil.semana}
📅 ${fStr.toUpperCase()}
🕒 ${hStr}

🔥 *Energía:* ${t.k} / 2000 kcal
🥩 Prot: ${t.p}g | 🍞 Carb: ${t.c}g | 🥑 Gras: ${t.g}g
💧 *Agua:* ${(agua/1000).toFixed(1)} Litros

📝 *Detalle:*
${list}
_Enviado desde mi Bio-Dashboard_ 🚀`;

            const el = document.createElement('textarea');
            el.value = msg; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            showToast("Reporte con fecha/hora copiado ✅");
        }

        function solicitarLimpieza() {
            document.getElementById('confirm-modal').classList.remove('hidden');
            document.getElementById('modal-confirm-btn').onclick = () => {
                registros = []; agua = 0;
                localStorage.removeItem('nutrilog_v6_data');
                localStorage.removeItem('nutrilog_v6_water');
                guardarYRefrescar();
                renderWaterDrops();
                closeConfirmModal();
                showToast("Día reiniciado con éxito", "danger");
            };
        }
        function closeConfirmModal() { document.getElementById('confirm-modal').classList.add('hidden'); }

        function showToast(msg, type = "success") {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            const colors = { success: 'bg-slate-900', warning: 'bg-amber-500', danger: 'bg-red-500' };
            t.className = `${colors[type]} text-white px-8 py-4 rounded-2xl shadow-2xl font-bold text-xs animate-entry flex items-center gap-3 border border-white/10`;
            t.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-circle-exclamation'}"></i> ${msg.toUpperCase()}`;
            container.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(-10px)'; setTimeout(() => t.remove(), 400); }, 3000);
        }
    </script>
</body>
</html>
